name: deploying the backend

on:
  push:
    branches: [ main ]


jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v2

      - name: Login to docker
        uses: docker/login-action@v2
        with: 
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: build the image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./dockerfile/Dockerfile.backend
          push: true
          tags: zeroskilldev/todo-app-backend:${{ github.sha }}

      - name: Execute remote SSH commands using SSH key
        uses: appleboy/ssh-action@v1
        with:
          host: 32.236.85.226 
          username: ubuntu
          key: ${{ secrets.KEY }}
          port: 22
          run: |
            docker stop todo_backend && docker run --name todo_backend -d -p 3001:3001 zeroskilldev/todo-app-backend:${{ github.sha }}